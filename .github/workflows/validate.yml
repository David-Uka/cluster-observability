name: Validate Manifests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  helm-template:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Add prometheus-community repo
        run: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts

      - name: helm template kube-prometheus-stack (${{ matrix.env }})
        run: |
          helm template kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --version 65.5.1 \
            -f helm/values-base.yaml \
            -f helm/values-${{ matrix.env }}.yaml \
            > /tmp/${{ matrix.env }}-helm.yaml

      - name: Validate helm output with kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          args: -strict -summary -ignore-missing-schemas /tmp/${{ matrix.env }}-helm.yaml

  kustomize-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Set up kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Build overlay
        run: kustomize build manifests/overlays/${{ matrix.env }} > /tmp/${{ matrix.env }}-extras.yaml

      - name: Validate with kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          args: -strict -summary -ignore-missing-schemas /tmp/${{ matrix.env }}-extras.yaml
