# Shared defaults for kube-prometheus-stack across all environments.
# Env-specific values files (values-dev.yaml / values-staging.yaml / values-prod.yaml)
# override the fields below via `helm upgrade -f values-base.yaml -f values-<env>.yaml`.

prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    additionalScrapeConfigs: []

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  config:
    route:
      receiver: "default"
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: "default"
        # Wire in Slack/PagerDuty webhook per environment via values-<env>.yaml override.

grafana:
  enabled: true
  adminPassword: "" # supply via --set or sealed secret at deploy time; never commit a real value
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      folder: /tmp/dashboards
      searchNamespace: ALL
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          options:
            path: /tmp/dashboards

defaultRules:
  create: true
  rules:
    alertmanager: true
    kubeApiserver: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    node: true
    prometheus: true
